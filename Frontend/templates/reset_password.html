<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Engine — Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0b0f1a;
            --surface:   rgba(255,255,255,0.04);
            --border:    rgba(255,255,255,0.08);
            --accent:    #4f8eff;
            --accent2:   #a78bfa;
            --accent3:   #34d399;
            --text:      #e8eaf0;
            --muted:     #6b7280;
            --danger:    #f87171;
            --shadow:    0 8px 32px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
            padding:24px; overflow-x:hidden;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(79,142,255,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(167,139,250,.10) 0%, transparent 55%);
            pointer-events:none; z-index:0;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size:48px 48px;
            pointer-events:none; z-index:0;
        }

        .auth-card {
            position:relative; z-index:1;
            width:100%; max-width:400px;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:22px;
            padding:40px 36px;
            backdrop-filter:blur(16px);
            box-shadow:var(--shadow);
            animation:fadeUp .65s ease both;
        }

        .brand { text-align:center; margin-bottom:28px; }
        .icon-wrap {
            width:52px; height:52px; border-radius:14px;
            background:rgba(52,211,153,.10); border:1px solid rgba(52,211,153,.2);
            display:flex; align-items:center; justify-content:center;
            font-size:22px; margin:0 auto 16px;
        }
        .brand h1 {
            font-family:'Syne',sans-serif;
            font-size:1.55rem; font-weight:800; letter-spacing:-.03em;
            background:linear-gradient(135deg,#fff 0%,#a3b8ff 60%,#a78bfa 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .brand p { margin-top:8px; color:var(--muted); font-size:13px; line-height:1.55; }

        .sect-divider { height:1px; background:var(--border); margin:0 0 24px; }

        .form-group { display:flex; flex-direction:column; gap:7px; margin-bottom:16px; }
        label { font-size:11px; font-weight:500; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); }

        input[type="password"] {
            background:rgba(255,255,255,.05); border:1px solid var(--border);
            border-radius:10px; padding:11px 14px;
            color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
            transition:border-color .2s, background .2s, box-shadow .2s;
            outline:none;
        }
        input:focus {
            border-color:var(--accent); background:rgba(79,142,255,.06);
            box-shadow:0 0 0 3px rgba(79,142,255,.12);
        }
        input::placeholder { color:var(--muted); opacity:.6; }

        /* Strength meter */
        .strength-track { height:4px; background:rgba(255,255,255,.07); border-radius:100px; margin-top:8px; overflow:hidden; }
        .strength-fill  { height:100%; border-radius:100px; width:0%; transition:width .4s ease, background .3s; }
        .strength-hint  { font-size:11px; color:var(--muted); margin-top:5px; }

        .btn-primary {
            width:100%; padding:13px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border:none; border-radius:11px; color:#fff;
            font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
            letter-spacing:.04em; cursor:pointer;
            box-shadow:0 4px 20px rgba(79,142,255,.25);
            transition:transform .15s, box-shadow .2s;
            position:relative; overflow:hidden;
        }
        .btn-primary::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.12),transparent); opacity:0; transition:opacity .2s; }
        .btn-primary:hover::after { opacity:1; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(79,142,255,.4); }

        .link-row { text-align:center; font-size:13px; color:var(--muted); margin-top:20px; }
        .link-row a { color:var(--accent); text-decoration:none; font-weight:500; }

        .flash { border-radius:10px; padding:12px 16px; font-size:13px; margin-bottom:18px; }
        .flash.error   { background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.2); color:var(--danger); }
        .flash.success { background:rgba(52,211,153,.08);  border:1px solid rgba(52,211,153,.2);  color:#34d399; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>
<div class="auth-card">

    <div class="brand">
        <div class="icon-wrap">🔒</div>
        <h1>Reset Password</h1>
        <p>Create a strong new password for your account.</p>
    </div>

    <div class="sect-divider"></div>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endwith %}

    <form action="/reset-password" method="post">
        <input type="hidden" name="email" value="{{ email }}">

        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password"
                   placeholder="••••••••" required
                   oninput="checkStrength(this.value)">
            <div class="strength-track">
                <div class="strength-fill" id="strengthFill"></div>
            </div>
            <span class="strength-hint" id="strengthHint">Enter a password</span>
        </div>

        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password"
                   placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn-primary">Reset Password →</button>

    </form>

    <div class="link-row">
        <a href="/">← Back to Login</a>
    </div>

</div>

<script>
function checkStrength(val) {
    const fill = document.getElementById("strengthFill");
    const hint = document.getElementById("strengthHint");
    let score = 0;
    if (val.length >= 8)  score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;

    const map = [
        { w:"0%",   bg:"transparent",  t:"Enter a password" },
        { w:"25%",  bg:"#f87171",      t:"Weak" },
        { w:"50%",  bg:"#fbbf24",      t:"Fair" },
        { w:"75%",  bg:"#4f8eff",      t:"Good" },
        { w:"100%", bg:"#34d399",      t:"Strong ✓" },
    ];
    const s = map[score];
    fill.style.width      = s.w;
    fill.style.background = s.bg;
    hint.textContent      = s.t;
    hint.style.color      = s.bg || "var(--muted)";
}
</script>
</body>
</html>
