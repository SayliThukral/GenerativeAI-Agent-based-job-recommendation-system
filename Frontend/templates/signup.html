<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Engine — Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:        #0b0f1a;
            --surface:   rgba(255,255,255,0.04);
            --border:    rgba(255,255,255,0.08);
            --accent:    #4f8eff;
            --accent2:   #a78bfa;
            --text:      #e8eaf0;
            --muted:     #6b7280;
            --danger:    #f87171;
            --shadow:    0 8px 32px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'DM Sans',sans-serif;
            background:var(--bg); color:var(--text);
            min-height:100vh;
            display:flex; align-items:center; justify-content:center;
            padding:40px 24px;
            overflow-x:hidden;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:
                radial-gradient(ellipse 70% 60% at 15% 10%, rgba(79,142,255,.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 85% 85%, rgba(167,139,250,.10) 0%, transparent 55%);
            pointer-events:none; z-index:0;
        }
        body::after {
            content:''; position:fixed; inset:0;
            background-image:
                linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
            background-size:48px 48px;
            pointer-events:none; z-index:0;
        }

        .auth-card {
            position:relative; z-index:1;
            width:100%; max-width:460px;
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:22px;
            padding:40px 36px;
            backdrop-filter:blur(16px);
            box-shadow:var(--shadow);
            animation:fadeUp .65s ease both;
        }

        .brand { text-align:center; margin-bottom:28px; }
        .brand .badge {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(79,142,255,.12); border:1px solid rgba(79,142,255,.25);
            color:var(--accent); font-size:11px; font-weight:500;
            letter-spacing:.08em; text-transform:uppercase;
            padding:4px 12px; border-radius:100px; margin-bottom:12px;
        }
        .brand h1 {
            font-family:'Syne',sans-serif;
            font-size:1.7rem; font-weight:800; letter-spacing:-.03em;
            background:linear-gradient(135deg,#fff 0%,#a3b8ff 60%,#a78bfa 100%);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .brand p { margin-top:5px; color:var(--muted); font-size:13px; }

        .sect-divider { height:1px; background:var(--border); margin:0 0 24px; }

        /* Two-column grid for name fields */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px 16px; }
        .form-group { display:flex; flex-direction:column; gap:7px; margin-bottom:0; }
        .form-group.full { grid-column:1 / -1; }
        .form-group-single { display:flex; flex-direction:column; gap:7px; margin-bottom:14px; }

        label {
            font-size:11px; font-weight:500;
            letter-spacing:.07em; text-transform:uppercase; color:var(--muted);
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            background:rgba(255,255,255,.05); border:1px solid var(--border);
            border-radius:10px; padding:11px 14px;
            color:var(--text); font-family:'DM Sans',sans-serif; font-size:14px;
            transition:border-color .2s, background .2s, box-shadow .2s;
            outline:none;
        }
        input:focus {
            border-color:var(--accent);
            background:rgba(79,142,255,.06);
            box-shadow:0 0 0 3px rgba(79,142,255,.12);
        }
        input::placeholder { color:var(--muted); opacity:.6; }

        /* Optional badge */
        .optional {
            display:inline-block; margin-left:6px;
            background:rgba(255,255,255,.06); color:var(--muted);
            font-size:9px; letter-spacing:.05em; text-transform:uppercase;
            padding:1px 6px; border-radius:4px;
        }

        .divider-gap { margin-top:16px; }

        .btn-primary {
            width:100%; padding:13px;
            background:linear-gradient(135deg,var(--accent),var(--accent2));
            border:none; border-radius:11px; color:#fff;
            font-family:'Syne',sans-serif; font-size:14px; font-weight:700;
            letter-spacing:.04em; cursor:pointer;
            box-shadow:0 4px 20px rgba(79,142,255,.25);
            transition:transform .15s, box-shadow .2s;
            position:relative; overflow:hidden; margin-top:20px;
        }
        .btn-primary::after { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(255,255,255,.12),transparent); opacity:0; transition:opacity .2s; }
        .btn-primary:hover::after { opacity:1; }
        .btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(79,142,255,.4); }
        .btn-primary:active { transform:translateY(0); }

        .link-row { text-align:center; font-size:13px; color:var(--muted); margin-top:20px; }
        .link-row a { color:var(--accent); text-decoration:none; font-weight:500; }
        .link-row a:hover { opacity:.8; }

        .flash { border-radius:10px; padding:12px 16px; font-size:13px; margin-bottom:18px; }
        .flash.error   { background:rgba(248,113,113,.08); border:1px solid rgba(248,113,113,.2); color:var(--danger); }
        .flash.success { background:rgba(52,211,153,.08);  border:1px solid rgba(52,211,153,.2);  color:#34d399; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

        @media(max-width:480px) {
            .form-grid { grid-template-columns:1fr; }
            .auth-card { padding:28px 20px; }
        }
    </style>
</head>
<body>
<div class="auth-card">

    <div class="brand">
        <div class="badge">✦ AI Powered</div>
        <h1>Create Account</h1>
        <p>Join SmartHire Engine and start your career analysis</p>
    </div>

    <div class="sect-divider"></div>

    {% if messages %}
        {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form action="/signup" method="post">

        <div class="form-grid">

            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="cool_handle" required>
            </div>

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Jane Doe" required>
            </div>

            <div class="form-group full">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group full">
                <label for="mobile">Mobile Number <span class="optional">optional</span></label>
                <input type="text" id="mobile" name="mobile" placeholder="+91 98765 43210">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>

        </div>

        <button type="submit" class="btn-primary">Create Account →</button>

    </form>

    <div class="link-row">
        Already have an account? <a href="/login">Login</a>
    </div>

</div>
</body>
</html>
