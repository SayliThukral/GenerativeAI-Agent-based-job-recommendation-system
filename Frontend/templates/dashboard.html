<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartHire Engine - AI Resume Analyzer</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <div class="top-link">
        <a href="/about">About Page</a>
    </div>

    <h1>SmartHire Engine</h1>
    <p class="tagline">Generative AI-based Job Recommendation & Gap Analysis System</p>

    <form id="uploadForm">
        <label for="fullName">Full Name</label>
        <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>

        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" name="dob" required>

        <label for="education">Highest Education Level</label>
        <select id="education" name="education" required>
            <option value="" disabled selected>Select Education Level</option>
            <option value="bachelor">Bachelor's Degree</option>
            <option value="master">Master's Degree</option>
            <option value="phd">PhD</option>
        </select>

        <label for="resume">Upload Resume (PDF/DOCX)</label>
        <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required>

        <label for="jd">Upload Job Description (PDF/DOCX)</label>
        <input type="file" id="jd" name="jd" accept=".pdf,.doc,.docx" required>

        <button type="submit">Analyze Profile</button>

        <div id="loading" style="display: none; margin-top: 15px; font-weight: bold; color: #007bff;">
            ⏳ Analyzing resume against Job Description... Please wait.
        </div>
    </form>

    <div id="result"></div>
</div>

<script src="/static/script.js"></script>

</body>
</html>
